<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video to Shorts - Uzun Videoyu Şortsa Çevir</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8f9ff;
        }
        
        .upload-area:hover {
            border-color: #764ba2;
            background: #f0f2ff;
        }
        
        .upload-area.dragover {
            background: #e0e7ff;
            border-color: #764ba2;
        }
        
        .upload-icon {
            font-size: 50px;
            margin-bottom: 15px;
        }
        
        .upload-text {
            color: #333;
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .upload-subtext {
            color: #999;
            font-size: 13px;
        }
        
        input[type="file"] {
            display: none;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        button {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .loading {
            display: none;
            text-align: center;
            margin: 20px 0;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .results {
            display: none;
            margin-top: 30px;
        }
        
        .results h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 18px;
        }
        
        .shorts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        
        .short-card {
            background: #f8f9ff;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            border: 2px solid #e0e7ff;
            transition: all 0.3s ease;
        }
        
        .short-card:hover {
            border-color: #667eea;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
        }
        
        .short-card a {
            display: inline-block;
            margin-top: 10px;
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            font-size: 12px;
        }
        
        .short-card a:hover {
            color: #764ba2;
        }
        
        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            display: none;
            border-left: 4px solid #c33;
        }
        
        .success {
            background: #efe;
            color: #3c3;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            display: none;
            border-left: 4px solid #3c3;
        }
        
        .file-info {
            color: #666;
            font-size: 13px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 Video to Shorts</h1>
        <p class="subtitle">Uzun videoyu otomatik olarak kısa şortslara çevir</p>
        
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📹</div>
            <div class="upload-text">Video dosyasını sürükle ve bırak</div>
            <div class="upload-subtext">veya tıkla - MP4, AVI, MOV desteklenir (Max 500MB)</div>
        </div>
        
        <div id="fileName" class="file-info"></div>
        
        <input type="file" id="videoInput" accept="video/*">
        
        <div class="button-group">
            <button class="btn-primary" id="selectBtn">📂 Dosya Seç</button>
            <button class="btn-primary" id="uploadBtn" disabled>⚙️ Yükle & İşle</button>
        </div>
        
        <div class="error" id="error"></div>
        <div class="success" id="success"></div>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Video işleniyor, lütfen bekle...</p>
            <p style="font-size: 12px; color: #999; margin-top: 10px;">Bu biraz zaman alabilir...</p>
        </div>
        
        <div class="results" id="results">
            <h2>✨ Shorts Hazırlandı!</h2>
            <p style="color: #666; font-size: 14px; margin-bottom: 15px;">Aşağıdan indir:</p>
            <div class="shorts-grid" id="shortsGrid"></div>
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const videoInput = document.getElementById('videoInput');
        const selectBtn = document.getElementById('selectBtn');
        const uploadBtn = document.getElementById('uploadBtn');
        const loading = document.getElementById('loading');
        const results = document.getElementById('results');
        const error = document.getElementById('error');
        const success = document.getElementById('success');
        const shortsGrid = document.getElementById('shortsGrid');
        const fileNameDiv = document.getElementById('fileName');
        
        let selectedFile = null;
        
        selectBtn.addEventListener('click', () => videoInput.click());
        
        videoInput.addEventListener('change', (e) => {
            selectedFile = e.target.files[0];
            if (selectedFile) {
                uploadBtn.disabled = false;
                const sizeMB = (selectedFile.size / (1024 * 1024)).toFixed(2);
                fileNameDiv.textContent = `Seçilen dosya: ${selectedFile.name} (${sizeMB}MB)`;
                success.textContent = `✅ ${selectedFile.name} seçildi`;
                success.style.display = 'block';
                error.style.display = 'none';
            }
        });
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            selectedFile = e.dataTransfer.files[0];
            if (selectedFile) {
                videoInput.files = e.dataTransfer.files;
                uploadBtn.disabled = false;
                const sizeMB = (selectedFile.size / (1024 * 1024)).toFixed(2);
                fileNameDiv.textContent = `Seçilen dosya: ${selectedFile.name} (${sizeMB}MB)`;
                success.textContent = `✅ ${selectedFile.name} seçildi`;
                success.style.display = 'block';
                error.style.display = 'none';
            }
        });
        
        uploadBtn.addEventListener('click', async () => {
            if (!selectedFile) return;
            
            const formData = new FormData();
            formData.append('video', selectedFile);
            
            loading.style.display = 'block';
            results.style.display = 'none';
            error.style.display = 'none';
            success.style.display = 'none';
            uploadBtn.disabled = true;
            selectBtn.disabled = true;
            
            try {
                const response = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.success) {
                    displayResults(data.shorts);
                    success.textContent = `✅ ${data.message}`;
                    success.style.display = 'block';
                } else {
                    error.textContent = `❌ ${data.error || 'Bir hata oluştu'}`;
                    error.style.display = 'block';
                }
            } catch (err) {
                error.textContent = `❌ Video yüklenemedi: ${err.message}`;
                error.style.display = 'block';
            } finally {
                loading.style.display = 'none';
                uploadBtn.disabled = false;
                selectBtn.disabled = false;
            }
        });
        
        function displayResults(shorts) {
            shortsGrid.innerHTML = '';
            shorts.forEach(short => {
                const card = document.createElement('div');
                card.className = 'short-card';
                card.innerHTML = `
                    <div style="font-weight: 600;">📹</div>
                    <div style="margin: 10px 0; font-weight: 600; color: #333;">Short #${short.number}</div>
                    <div style="font-size: 12px; color: #999;">
                        ⏱️ ${short.duration}s
                    </div>
                    <a href="/api/shorts/${short.filename}" download>
                        ⬇️ İndir
                    </a>
                `;
                shortsGrid.appendChild(card);
            });
            results.style.display = 'block';
        }
    </script>
</body>
</html>
